    - formula
    type: string
    x-enum-varnames:
    - ExcelCondGreaterThan
    - ExcelCondLessThan
    - ExcelCondEqual
    - ExcelCondContainsText
    - ExcelCondFormula
  models.ExcelGenerateRequest:
