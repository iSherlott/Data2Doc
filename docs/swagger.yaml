    - user
    type: object
  models.AlignmentEnum:
    enum:
    - left
    - center
    - right
    - justify
    type: string
    x-enum-varnames:
    - AlignLeft
    - AlignCenter
    - AlignRight
    - AlignJustify
  models.ChartTypeEnum:
