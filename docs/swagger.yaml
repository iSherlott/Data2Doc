host: localhost:8080
info:
  contact: {}
  description: Data binding to documents (excel/word/pdf/csv) with JSON or XML input.
  title: Data2Doc API
  version: "1.0"
paths:
  /generate/excel:
    post:
      consumes:
      - application/json
      - text/xml
      description: Generates an XLSX document. Supports JSON and XML.
      parameters:
      - description: Excel request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/Data2Doc_internal_models.ExcelGenerateRequest'
      produces:
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Generate an Excel document
      tags:
      - documents
  /generate/pdf:
    post:
      consumes:
      - application/json
      - text/xml
      description: Generates a PDF document. Supports JSON and XML.
      parameters:
      - description: PDF request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/Data2Doc_internal_models.PDFGenerateRequest'
      produces:
      - application/pdf
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Generate a PDF document
      tags:
      - documents
  /generate/word:
    post:
      consumes:
      - application/json
      - text/xml
      description: Generates a Word (DOCX) document. Supports JSON and XML.
      parameters:
      - description: Word request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/Data2Doc_internal_models.WordGenerateRequest'
      produces:
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Generate a Word (DOCX) document
      tags:
      - documents
securityDefinitions:
  BearerAuth:
    description: Type "Bearer {token}"
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
