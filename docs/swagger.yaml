basePath: /
definitions:
  handlers.MetaResponse:
    properties:
      authMode:
        type: string
      build:
        additionalProperties:
          type: string
        type: object
      env:
        type: string
      hasJwksUrl:
        type: boolean
      hasSentry:
        type: boolean
      name:
        type: string
      port:
        type: string
      timeUtc:
        type: string
      version:
        type: string
    type: object
  handlers.tokenRequest:
    properties:
      pass:
        type: string
      user:
        type: string
