        items:
          type: string
        type: array
      percentageOf:
        example: salary
        type: string
      sheetFormula:
        example: SUM(Employees!B2:B100)
        type: string
      textColor:
        example: '#000000'
        type: string
      title:
        example: Name
        type: string
      validationRange:
        example: Products!A2:A50
        type: string
      verticalAlignment:
        allOf:
        - $ref: '#/definitions/models.VerticalAlignmentEnum'
