        example: '#FEC7CE'
        type: string
      formula:
        example: =$B2>100
        type: string
      operator:
        allOf:
        - $ref: '#/definitions/models.ExcelConditionalOperatorEnum'
        example: greaterThan
      textColor:
        example: '#9A0511'
        type: string
      value:
        example: "100"
        type: string
    type: object
  models.ExcelConditionalOperatorEnum:
    enum:
