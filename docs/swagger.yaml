          $ref: '#/definitions/models.ExcelConditionalFormattingRule'
        type: array
      field:
        example: name
        type: string
      format:
        allOf:
        - $ref: '#/definitions/models.ColumnFormatEnum'
        example: currency
      formula:
        description: Excel calculation features
        example: price * qty
        type: string
      headerColor:
        example: '#FFFFFF'
        type: string
      hidden:
        type: boolean
      locked:
        type: boolean
      lookup:
        $ref: '#/definitions/models.ExcelLookupConfig'
